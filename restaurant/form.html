<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Form</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Yuyu+Short&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Archivo', sans-serif;
        background-color: rgb(54, 0, 0);
        background-image: url('https://static.vecteezy.com/system/resources/thumbnails/069/256/077/small/red-light-on-a-black-background-photo.jpg');
        background-repeat: no-repeat;
        background-size: 100%;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      form {
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <h1>♧ METUBE</h1>
    <form>
      <label for="username">username</label>
      <input
        type="text"
        name="username"
        id="username"
        placeholder="Enter username"
        required
      />
      <label for="password">password</label>
      <input
        type="password"
        name="password"
        id="password"
        placeholder="Enter password"
        required
      />
      <label for="email">email</label>
      <input
        type="email"
        name="email"
        id="email"
        placeholder="Enter email"
        required
      />
      <p>Metube Package</p>
      <label><input type="radio" name="package" id="free" value="free" checked />Free Plan</label>
      <label><input type="radio" name="package" id="lite" value="lite" />Lite</label>
      <label><input type="radio" name="package" id="premium" value="premium" />Premium</label>

      <p>Interests</p>
      <label><input type="checkbox" name="interest" id="movie" value="movie">Movie</label>
      <label><input type="checkbox" name="interest" id="music" value="music">Music</label>
      <label><input type="checkbox" name="interest" id="game" value="game">Game</label>

      <button type="submit">Confirm</button>
    </form>
  </body>
</html>
